<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>一年級注音學習單產生器</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #5f6b7a;
      --line: #c9d2df;
      --paper: #fffdf8;
      --panel: #f4f7fb;
      --accent: #2f6f73;
      --accent-2: #b4532a;
      --soft: #eaf3f1;
      --grid: #d9e0ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #e8edf3;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.55;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      min-height: 100vh;
    }

    .controls {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid #d7dee8;
    }

    .controls h1 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    .brand-title {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .control-group {
      margin: 0 0 18px;
      padding-top: 16px;
      border-top: 1px solid #d7dee8;
    }

    .control-group:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #334155;
      font-weight: 700;
      font-size: .95rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #c7d0dc;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .field {
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions button,
    .wide-button {
      border: 1px solid #b8c4d2;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      cursor: pointer;
      min-height: 42px;
    }

    .actions button:hover,
    .wide-button:hover {
      background: #f8fafc;
    }

    .primary {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
    }

    .warn {
      color: var(--accent-2);
      border-color: #e2b49f !important;
    }

    .hint {
      color: var(--muted);
      font-size: .86rem;
      margin: 6px 0 0;
    }

    .credit-note {
      margin: 18px 0 0;
      padding: 12px 0 0;
      border-top: 1px solid #d7dee8;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.7;
    }

    .preview-shell {
      padding: 28px;
      overflow: auto;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 28px;
      padding: 13mm 14mm;
      background: var(--paper);
      box-shadow: 0 10px 35px rgba(15, 23, 42, .16);
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "DFKai-SB", "KaiTi", "Noto Sans TC", "Microsoft JhengHei", serif;
      display: flex;
      flex-direction: column;
    }

    .sheet-header {
      padding-bottom: 10px;
      border-bottom: 3px solid var(--accent);
    }

    .sheet-heading-line {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sheet-title {
      margin: 0;
      font-size: 25pt;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .sheet-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12pt;
      white-space: nowrap;
    }

    .header-name {
      flex: 1 1 250px;
      display: flex;
      align-items: flex-end;
      min-width: 250px;
      margin-left: auto;
      font-size: 12.5pt;
    }

    .blank-line {
      display: inline-block;
      min-width: 8em;
      height: 24px;
      border-bottom: 1.5px solid #6b7280;
      transform: translateY(1px);
    }

    .header-name .blank-line {
      flex: 1;
      min-width: 13em;
      height: 30px;
    }

    .section {
      margin-top: 13px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      font-size: 15pt;
      line-height: 1.25;
    }

    .section-title .tag {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 12pt;
    }

    .story-box {
      padding: 10px 12px 8px;
      background: var(--soft);
      border: 1px solid #c8dad5;
      border-radius: 8px;
      font-size: 17pt;
      line-height: 2.15;
    }

    .phonetic-char {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .08em;
      vertical-align: middle;
      margin: 0 .02em;
      white-space: nowrap;
    }

    .phonetic-char .han {
      line-height: 1;
    }

    .bpmf-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: .66em;
      transform: translateY(-.04em);
    }

    .bpmf-stack {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .02em;
      color: #334155;
      font-size: .44em;
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "Microsoft JhengHei", sans-serif;
      font-weight: 500;
      line-height: .95;
      letter-spacing: 0;
    }

    .bpmf-tone {
      align-self: center;
      margin-left: .09em;
      color: #334155;
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "Microsoft JhengHei", sans-serif;
      font-size: .68em;
      font-weight: 800;
      line-height: 1;
      transform: translateY(.02em);
    }

    .copy-lines {
      margin-top: 8px;
      display: grid;
      gap: 10px;
    }

    .copy-line {
      height: 36px;
      border-bottom: 1.5px solid #8a94a3;
    }

    .practice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .practice-cell {
      min-height: 244px;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, 1fr);
      border: 1.4px solid var(--grid);
      background: #fff;
    }

    .practice-row {
      display: grid;
      grid-template-columns: 68px 1fr;
      min-height: 0;
    }

    .practice-row + .practice-row {
      border-top: 1.4px solid var(--grid);
    }

    .practice-cell .model {
      display: grid;
      place-items: center;
      border-right: 1.4px solid var(--grid);
      color: #1f2933;
      font-size: 22pt;
      font-weight: 700;
      line-height: 1;
      padding: 6px;
    }

    .practice-write {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .write-box {
      min-width: 0;
      box-shadow: inset 0 0 0 1.4px var(--grid);
    }

    .practice-cell .model .phonetic-char {
      gap: .05em;
    }

    .practice-cell .model .bpmf-stack {
      font-size: .36em;
    }

    .practice-cell .model .bpmf-tone {
      font-size: .62em;
      font-weight: 800;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 12px;
      align-items: stretch;
    }

    .section-activity {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .section-activity .activity-grid {
      flex: 1 1 auto;
      min-height: 0;
    }

    .draw-box {
      min-height: 180px;
      height: 100%;
      border: 2px solid #9da8b7;
      background:
        linear-gradient(#ffffff 31px, transparent 32px),
        linear-gradient(90deg, #ffffff 31px, transparent 32px);
      background-size: 32px 32px;
      border-radius: 8px;
      position: relative;
    }

    .draw-label {
      position: absolute;
      top: 18px;
      left: 10px;
      padding: 2px 7px;
      background: rgba(255, 253, 248, .92);
      color: var(--muted);
      font-size: 11pt;
      border-radius: 4px;
    }

    .answer-box {
      border: 1.5px solid var(--grid);
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      min-height: 180px;
      height: 100%;
    }

    .prompt {
      margin: 0 0 8px;
      font-size: 13pt;
      font-weight: 700;
    }

    .answer-line {
      height: 32px;
      border-bottom: 1.4px solid #8a94a3;
    }

    .free-response {
      min-height: 120px;
      margin-top: 12px;
    }

    .footer-note {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      font-size: 12pt;
      padding-top: 16px;
    }

    .small-lines {
      display: grid;
      gap: 9px;
      margin-top: 7px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
        height: auto;
      }

      .preview-shell {
        padding: 14px;
      }

      .page {
        width: min(100%, 210mm);
        min-height: auto;
      }
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .controls {
        display: none;
      }

      .app {
        display: block;
      }

      .preview-shell {
        padding: 0;
        overflow: visible;
      }

      .page {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        margin: 0;
        padding: 8.5mm 10mm;
        box-shadow: none;
        break-after: auto;
      }

      .sheet-title {
        font-size: 21pt;
      }

      .sheet-subtitle,
      .header-name {
        font-size: 11pt;
      }

      .header-name {
        flex-basis: 230px;
        min-width: 230px;
      }

      .header-name .blank-line {
        min-width: 12em;
        height: 26px;
      }

      .section {
        margin-top: 8px;
      }

      .section-title {
        margin-bottom: 7px;
        font-size: 14pt;
      }

      .story-box {
        padding: 7px 10px 6px;
        font-size: 14pt;
        line-height: 1.68;
      }

      .copy-lines {
        gap: 7px;
      }

      .copy-line {
        height: 31px;
      }

      .practice-cell {
        min-height: 228px;
      }

      .practice-row {
        grid-template-columns: 64px 1fr;
      }

      .practice-cell .model {
        font-size: 21pt;
      }

      .draw-box,
      .answer-box {
        min-height: 118px;
      }

      .draw-label {
        top: 18px;
      }

      .prompt {
        margin-bottom: 5px;
        font-size: 11.5pt;
      }

      .answer-line {
        height: 32px;
      }

      .free-response {
        min-height: 74px;
      }

      .footer-note {
        margin-top: 10px;
        font-size: 10.5pt;
        gap: 24px;
        padding-top: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="controls" aria-label="學習單控制區">
      <div class="brand-title">飽螺的社工甘苦便條紙製作</div>
      <h1>一年級注音學習單產生器</h1>

      <div class="control-group">
        <div class="field">
          <label for="themeSelect">主題</label>
          <select id="themeSelect"></select>
        </div>
        <div class="row">
          <div class="field">
            <label for="studentName">姓名</label>
            <input id="studentName" value="" placeholder="學生姓名">
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="randomBtn" type="button">隨機產生</button>
        </div>
      </div>

      <div class="control-group">
        <div class="field">
          <label for="customTitle">標題</label>
          <input id="customTitle" value="一年級國語注音學習單">
        </div>
        <div class="field">
          <label for="storyText">短文</label>
          <textarea id="storyText"></textarea>
        </div>
        <div class="field">
          <label for="practiceText">注音練習字</label>
          <input id="practiceText">
        </div>
        <div class="field">
          <label for="questionText">問題</label>
          <textarea id="questionText"></textarea>
        </div>
        <div class="field">
          <label for="drawText">畫圖題</label>
          <input id="drawText">
        </div>
      </div>

      <div class="control-group">
        <div class="actions">
          <button id="saveBtn" type="button">存成PDF</button>
          <button id="resetBtn" type="button">列印</button>
        </div>
      </div>
      <p class="credit-note">本學習單生產器參考富田國小所提供之相關教案設計，在此感謝老師的創意。</p>
    </aside>

    <section class="preview-shell" aria-label="學習單預覽">
      <article class="page" id="worksheet">
        <header class="sheet-header">
          <div class="sheet-heading-line">
            <h2 class="sheet-title" id="sheetTitle"></h2>
            <p class="sheet-subtitle" id="sheetSubtitle"></p>
            <div class="header-name">姓名：<span class="blank-line" id="nameLine"></span></div>
          </div>
        </header>

        <section class="section">
          <h3 class="section-title" id="sectionTitleOne"></h3>
          <div class="story-box" id="storyBox"></div>
          <div class="copy-lines" aria-hidden="true">
            <div class="copy-line"></div>
            <div class="copy-line"></div>
            <div class="copy-line"></div>
            <div class="copy-line"></div>
            <div class="copy-line"></div>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title" id="sectionTitleTwo"></h3>
          <div class="practice-grid" id="practiceGrid"></div>
        </section>

        <section class="section section-activity">
          <h3 class="section-title" id="sectionTitleThree"></h3>
          <div class="activity-grid">
            <div class="draw-box">
              <div class="draw-label" id="drawLabel"></div>
            </div>
            <div class="answer-box">
              <p class="prompt" id="questionBox"></p>
              <div class="free-response" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <footer class="footer-note">
          <div>
            <span id="taskLabel"></span><span id="taskText"></span>
            <div class="small-lines">
              <div class="answer-line"></div>
            </div>
          </div>
          <div>
            <span id="moodLabel"></span>
            <div class="small-lines">
              <div class="answer-line"></div>
            </div>
          </div>
        </footer>
      </article>
    </section>
  </main>

  <script>
    const selCategories = [
          {
                "key": "self_awareness",
                "label": "自我覺察"
          },
          {
                "key": "self_management",
                "label": "自我管理"
          },
          {
                "key": "social_awareness",
                "label": "社會覺察"
          },
          {
                "key": "relationship_skills",
                "label": "人際技巧"
          },
          {
                "key": "responsible_decision",
                "label": "負責任的決策"
          }
    ];

    const sheets = [
          {
                "key": "park",
                "label": "公園散步",
                "topic": "觀察",
                "subtitle": "SEL主題：負責任的決策｜觀察",
                "story": "今天早上，我和媽媽去公園。樹上有綠葉，地上有小花。我看一看，也慢慢說出看到的東西。",
                "practice": "公園、樹葉、小花、小路",
                "question": "故事裡，孩子在公園看到什麼？",
                "drawing": "畫出公園裡的一樣東西",
                "task": "和家人說出今天看到的一種顏色。",
                "selCategory": "responsible_decision"
          },
          {
                "key": "rain",
                "label": "雨天上學",
                "topic": "照顧",
                "subtitle": "SEL主題：自我管理｜照顧",
                "story": "早上，下起小雨。爸爸幫我拿雨衣，我自己背好書包。到學校時，我跟爸爸說謝謝。",
                "practice": "小雨、雨衣、書包、雨鞋",
                "question": "故事裡，誰幫孩子拿雨衣？",
                "drawing": "畫出一件雨天會用到的東西",
                "task": "回家後，把雨具放在固定的位置。",
                "selCategory": "self_management"
          },
          {
                "key": "library",
                "label": "圖書角",
                "topic": "閱讀",
                "subtitle": "SEL主題：自我管理｜閱讀",
                "story": "下課時，我走到圖書角。桌上有一本故事書，我安靜地看。看到好笑的地方，我小聲笑了。",
                "practice": "圖書、故事、安靜、書架",
                "question": "孩子在圖書角做了什麼？",
                "drawing": "畫出一本你想看的書",
                "task": "今天選一本書，翻開看三頁。",
                "selCategory": "self_management"
          },
          {
                "key": "homework",
                "label": "完成作業",
                "topic": "專心",
                "subtitle": "SEL主題：自我管理｜專心",
                "story": "晚飯後，我坐在書桌前。鉛筆和橡皮都放好了。我先寫一行字，再休息一下。",
                "practice": "書桌、鉛筆、橡皮、作業",
                "question": "孩子先寫了什麼？",
                "drawing": "畫出你寫作業時會用的文具",
                "task": "完成一小段功課後，把文具收好。",
                "selCategory": "self_management"
          },
          {
                "key": "friend",
                "label": "和同學分享",
                "topic": "分享",
                "subtitle": "SEL主題：人際技巧｜分享",
                "story": "美勞課時，我有兩張色紙。同學少了一張，我分給他一張。他笑著說謝謝，我也很開心。",
                "practice": "同學、色紙、開心、朋友",
                "question": "孩子把什麼分給同學？",
                "drawing": "畫出你願意分享的一樣東西",
                "task": "今天對一位同學或家人說一句好話。",
                "selCategory": "relationship_skills"
          },
          {
                "key": "plant",
                "label": "照顧小芽",
                "topic": "耐心",
                "subtitle": "SEL主題：自我管理｜耐心",
                "story": "窗邊有一盆小芽。我輕輕澆水，也看看泥土。小芽還很小，我會每天來看它。",
                "practice": "小芽、澆水、泥土、葉子",
                "question": "孩子每天想看什麼？",
                "drawing": "畫出一棵正在長大的植物",
                "task": "觀察家裡或路邊的一片葉子。",
                "selCategory": "self_management"
          },
          {
                "key": "sel_responsibility",
                "label": "整理座位",
                "topic": "負責",
                "subtitle": "SEL主題：負責任的決策｜負責",
                "story": "下課前，我把鉛筆放進筆盒。椅子靠好，桌上也收乾淨。我做好自己的小事，心裡很踏實。",
                "practice": "負責、座位、筆盒、抽屜",
                "question": "孩子做了哪一件負責的事？",
                "drawing": "畫出你會自己整理的一樣東西",
                "task": "今天自己收好一樣物品。",
                "selCategory": "responsible_decision"
          },
          {
                "key": "sel_emotion",
                "label": "我會說心情",
                "topic": "情緒",
                "subtitle": "SEL主題：自我覺察｜情緒",
                "story": "我今天有一點生氣，因為積木倒了。我先停一下，慢慢吸一口氣。後來，我告訴老師我的心情。",
                "practice": "情緒、生氣、心情、臉色",
                "question": "孩子生氣時，先做了什麼？",
                "drawing": "畫出你今天的一種心情",
                "task": "用一句話告訴家人今天的心情。",
                "selCategory": "self_awareness"
          },
          {
                "key": "sel_empathy",
                "label": "我會關心同學",
                "topic": "同理",
                "subtitle": "SEL主題：社會覺察｜同理",
                "story": "同學跌倒了，坐在地上哭。我走過去，問他痛不痛。老師來以前，我陪他等一下。",
                "practice": "同理、關心、陪伴、朋友",

    const state = {

    function todayString() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function fillThemeOptions() {
      themeSelect.innerHTML = "";
      selCategories.forEach((category) => {
        const group = document.createElement("optgroup");
        group.label = category.label;
        sheets
          .filter((sheet) => sheet.selCategory === category.key)
          .forEach((sheet) => {
            const option = document.createElement("option");
            option.value = sheet.key;
            option.textContent = `${sheet.label}｜${sheet.topic}`;
            group.appendChild(option);
          });
        themeSelect.appendChild(group);
      });
    }

    function loadSheet(sheet) {
      state.active = sheet;
      themeSelect.value = sheet.key;
      storyText.value = sheet.story;
      practiceText.value = normalizePracticeText(sheet.practice);
      questionText.value = sheet.question;
      drawText.value = sheet.drawing;
      render();
    }

    function parseRubyInput() {
      state.ruby = { ...baseRuby };
      state.phraseRuby = { ...phraseRuby };
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderZhuyinMark(zhuyin) {
      const toneMarks = new Set(["ˊ", "ˇ", "ˋ", "˙"]);
      const marks = Array.from(String(zhuyin || ""));
      const tone = marks.filter((ch) => toneMarks.has(ch)).join("");
      const symbols = marks.filter((ch) => !toneMarks.has(ch));
      const stack = symbols.map((ch) => `<span>${escapeHTML(ch)}</span>`).join("");
      const toneHTML = tone ? `<span class="bpmf-tone">${escapeHTML(tone)}</span>` : "";
      return `<span class="bpmf-wrap"><span class="bpmf-stack">${stack}</span>${toneHTML}</span>`;
    }

    function isCjkChar(value) {
      return /[\u4e00-\u9fff]/.test(value);
    }

    function renderRubyUnit(char, zhuyin) {
      if (zhuyin) {
        return `<span class="phonetic-char"><span class="han">${escapeHTML(char)}</span>${renderZhuyinMark(zhuyin)}</span>`;
      }
      return escapeHTML(char);
    }

    function rubyUnits(text) {
      const chars = Array.from(String(text || ""));
      const phraseKeys = Object.keys(state.phraseRuby).sort((a, b) => Array.from(b).length - Array.from(a).length);
      const units = [];
      for (let i = 0; i < chars.length;) {
        const ch = chars[i];
        if (ch === "\n") {
          units.push({ char: ch, breakLine: true });
          i += 1;
          continue;
        }

        let matched = false;
        if (isCjkChar(ch)) {
          for (const phrase of phraseKeys) {
            const phraseChars = Array.from(phrase);
            if (phraseChars.length < 2 || i + phraseChars.length > chars.length) continue;
            const candidate = chars.slice(i, i + phraseChars.length).join("");
            const zhuyin = state.phraseRuby[phrase];
            if (candidate === phrase && zhuyin && zhuyin.length === phraseChars.length) {
              phraseChars.forEach((char, index) => units.push({ char, zhuyin: zhuyin[index] }));
              i += phraseChars.length;
              matched = true;
              break;
            }
          }
        }

        if (!matched) {
          units.push({ char: ch, zhuyin: state.ruby[ch] });
          i += 1;
        }
      }
      return units;
    }

    function renderRuby(text) {
      return rubyUnits(text).map((unit) => {
        if (unit.breakLine) return "<br>";
        return renderRubyUnit(unit.char, unit.zhuyin);
      }).join("");
    }

    function dateForPrint(value) {
      if (!value) return "";
      const [y, m, d] = value.split("-");
      return `${Number(m)}月${Number(d)}日`;
    }

    function getPracticeTerms(value) {
      const raw = String(value || "").trim();
      if (!raw) return [];
      const explicitTerms = raw.split(/[\u3001\uff0c,\n]+/).map((term) => term.trim()).filter(Boolean);
      if (explicitTerms.length > 1) return explicitTerms.slice(0, 4);
      const compact = raw.replace(/\s/g, "");
      const terms = [];
      for (let i = 0; i < compact.length && terms.length < 4; i += 2) {
        terms.push(compact.slice(i, i + 2));
      }
      return terms;
    }

    function completePracticeTerms(terms, fallbackTerms = []) {
      const result = [];
      const safeNounFallbacks = ["同學", "老師", "書包", "鉛筆", "桌子", "水壺", "圖畫", "卡片"];
      const blockedTerms = new Set([
        "我和", "我們", "你們", "他們", "她們", "一起", "可以", "怎麼",
        "以後", "再做", "做錯", "說出", "告訴", "對不起", "請你"
      ]);
      [...terms, ...fallbackTerms, ...safeNounFallbacks].forEach((term) => {
        const clean = String(term || "").replace(/\s/g, "");
        const isBlocked = Array.from(blockedTerms).some((blocked) => clean.includes(blocked));
        if (clean && !isBlocked && !result.includes(clean)) result.push(clean.slice(0, 4));
      });
      return result.slice(0, 4);
    }

    function normalizePracticeText(value, fallbackValue = "") {
      return completePracticeTerms(getPracticeTerms(value), getPracticeTerms(fallbackValue)).join("、");
    }

    function renderPractice() {
      const terms = completePracticeTerms(getPracticeTerms(practiceText.value), getPracticeTerms(state.active.practice));
      const grid = document.getElementById("practiceGrid");
      grid.innerHTML = "";
      const columns = [
        [terms[0], terms[2]],
        [terms[1], terms[3]]
      ];
      columns.forEach((columnTerms) => {
        const chars = columnTerms.flatMap((term) => {
          const termUnits = rubyUnits(term).filter((unit) => isCjkChar(unit.char)).slice(0, 2);
          while (termUnits.length < 2) termUnits.push({ char: "" });
          return termUnits;
        });
        const item = document.createElement("div");
        item.className = "practice-cell";
        item.innerHTML = chars.map((char) => `
          <div class="practice-row">
            <div class="model">${char.char ? renderRubyUnit(char.char, char.zhuyin) : ""}</div>
            <div class="practice-write">
              <span class="write-box"></span>
              <span class="write-box"></span>
              <span class="write-box"></span>
              <span class="write-box"></span>
            </div>
          </div>
        `).join("");
        grid.appendChild(item);
      });
    }

    function render() {
      parseRubyInput();
      const normalizedPractice = normalizePracticeText(practiceText.value, state.active.practice);
      if (practiceText.value !== normalizedPractice) practiceText.value = normalizedPractice;
      document.getElementById("sheetTitle").textContent = customTitle.value || "一年級國語注音學習單";
      document.getElementById("sheetSubtitle").textContent = state.active.subtitle;
      document.getElementById("nameLine").textContent = studentName.value;
      document.getElementById("sectionTitleOne").innerHTML = renderRuby("一、讀一讀，抄一抄");
      document.getElementById("sectionTitleTwo").innerHTML = renderRuby("二、注音練習");
      document.getElementById("sectionTitleThree").innerHTML = renderRuby("三、畫一畫，寫一寫");
      document.getElementById("storyBox").innerHTML = renderRuby(storyText.value);
      document.getElementById("questionBox").innerHTML = renderRuby(questionText.value);
      document.getElementById("drawLabel").innerHTML = renderRuby(drawText.value);
      document.getElementById("taskLabel").innerHTML = renderRuby("今日小任務：");
      document.getElementById("taskText").innerHTML = renderRuby(state.active.task);
      document.getElementById("moodLabel").innerHTML = renderRuby("我覺得今天：");
      renderPractice();
    }

    function randomSheet() {
      const selected = sheets[Math.floor(Math.random() * sheets.length)];
      loadSheet(selected);
    }

    function saveCurrent() {
      const payload = {
        theme: state.active.key,
        name: studentName.value,
        title: customTitle.value,
        story: storyText.value,
        practice: practiceText.value,
        question: questionText.value,
        drawing: drawText.value
      };
      localStorage.setItem("first-grade-zhuyin-worksheet", JSON.stringify(payload));
    }

    function restoreSaved() {
      const raw = localStorage.getItem("first-grade-zhuyin-worksheet");
      if (!raw) return false;
      try {
        const payload = JSON.parse(raw);
        const sheet = sheets.find((item) => item.key === payload.theme) || sheets[0];
        state.active = sheet;
        themeSelect.value = sheet.key;
        studentName.value = payload.name || "";
        customTitle.value = payload.title || "一年級國語注音學習單";
        storyText.value = payload.story || sheet.story;
        practiceText.value = normalizePracticeText(payload.practice || sheet.practice, sheet.practice);
        questionText.value = payload.question || sheet.question;
        drawText.value = payload.drawing || sheet.drawing;
        render();
        return true;
      } catch (error) {
        return false;
      }
    }

    fillThemeOptions();
    if (!restoreSaved()) {
      loadSheet(sheets[0]);
    }

    themeSelect.addEventListener("change", () => {
      const sheet = sheets.find((item) => item.key === themeSelect.value) || sheets[0];
      loadSheet(sheet);
    });

    document.getElementById("randomBtn").addEventListener("click", randomSheet);
    document.getElementById("saveBtn").addEventListener("click", () => {
      saveCurrent();
      render();
      window.print();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      window.print();
    });

    [studentName, customTitle, storyText, practiceText, questionText, drawText]
      .forEach((el) => el.addEventListener("input", render));
