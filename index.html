<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>一年級注音學習單產生器</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #5f6b7a;
      --line: #c9d2df;
      --paper: #fffdf8;
      --panel: #f4f7fb;
      --accent: #2f6f73;
      --accent-2: #b4532a;
      --soft: #eaf3f1;
      --grid: #d9e0ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #e8edf3;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.55;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      min-height: 100vh;
    }

    .controls {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid #d7dee8;
    }

    .controls h1 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    .brand-title {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .control-group {
      margin: 0 0 18px;
      padding-top: 16px;
      border-top: 1px solid #d7dee8;
    }

    .control-group:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #334155;
      font-weight: 700;
      font-size: .95rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #c7d0dc;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .field {
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions button,
    .wide-button {
      border: 1px solid #b8c4d2;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      cursor: pointer;
      min-height: 42px;
    }

    .actions button:hover,
    .wide-button:hover {
      background: #f8fafc;
    }

    .primary {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
    }

    .warn {
      color: var(--accent-2);
      border-color: #e2b49f !important;
    }

    .hint {
      color: var(--muted);
      font-size: .86rem;
      margin: 6px 0 0;
    }

    .credit-note {
      margin: 18px 0 0;
      padding: 12px 0 0;
      border-top: 1px solid #d7dee8;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.7;
    }

    .preview-shell {
      padding: 28px;
      overflow: auto;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 28px;
      padding: 13mm 14mm;
      background: var(--paper);
      box-shadow: 0 10px 35px rgba(15, 23, 42, .16);
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "DFKai-SB", "KaiTi", "Noto Sans TC", "Microsoft JhengHei", serif;
    }

    .sheet-header {
      padding-bottom: 10px;
      border-bottom: 3px solid var(--accent);
    }

    .sheet-heading-line {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sheet-title {
      margin: 0;
      font-size: 25pt;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .sheet-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12pt;
      white-space: nowrap;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr .9fr;
      gap: 10px;
      margin-top: 12px;
      font-size: 12.5pt;
    }

    .blank-line {
      display: inline-block;
      min-width: 7em;
      border-bottom: 1.5px solid #6b7280;
      transform: translateY(-2px);
    }

    .section {
      margin-top: 13px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      font-size: 15pt;
      line-height: 1.25;
    }

    .section-title .tag {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 12pt;
    }

    .story-box {
      padding: 10px 12px 8px;
      background: var(--soft);
      border: 1px solid #c8dad5;
      border-radius: 8px;
      font-size: 17pt;
      line-height: 2.15;
    }

    .phonetic-char {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .08em;
      vertical-align: middle;
      margin: 0 .02em;
      white-space: nowrap;
    }

    .phonetic-char .han {
      line-height: 1;
    }

    .bpmf-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: .66em;
      transform: translateY(-.04em);
    }

    .bpmf-stack {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .02em;
      color: #334155;
      font-size: .44em;
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "Microsoft JhengHei", sans-serif;
      font-weight: 500;
      line-height: .95;
      letter-spacing: 0;
    }

    .bpmf-tone {
      align-self: center;
      margin-left: .05em;
      color: #334155;
      font-family: "BopomofoRuby1909-v1", "BpmfZihiSans", "Microsoft JhengHei", sans-serif;
      font-size: .38em;
      line-height: 1;
      transform: translateY(.08em);
    }

    .copy-lines {
      margin-top: 8px;
      display: grid;
      gap: 7px;
    }

    .copy-line {
      height: 30px;
      border-bottom: 1.5px solid #8a94a3;
    }

    .practice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .practice-cell {
      min-height: 122px;
      display: grid;
      grid-template-columns: 82px 1fr;
      border: 1.4px solid var(--grid);
      background: #fff;
    }

    .practice-cell .model {
      display: grid;
      place-items: center;
      border-right: 1.4px solid var(--grid);
      color: #1f2933;
      font-size: 18pt;
      font-weight: 700;
      line-height: 1;
      padding: 6px;
    }

    .practice-cell .model .phonetic-char {
      gap: .05em;
    }

    .practice-cell .model .bpmf-stack {
      font-size: .36em;
    }

    .practice-cell .model .bpmf-tone {
      font-size: .32em;
    }

    .practice-cell .trace {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      min-width: 0;
    }

    .practice-cell .trace span {
      border-right: 1px dashed #cbd5e1;
    }

    .practice-cell .trace span:last-child {
      border-right: 0;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 12px;
      align-items: stretch;
    }

    .draw-box {
      min-height: 210px;
      border: 2px solid #9da8b7;
      background:
        linear-gradient(#ffffff 31px, transparent 32px),
        linear-gradient(90deg, #ffffff 31px, transparent 32px);
      background-size: 32px 32px;
      border-radius: 8px;
      position: relative;
    }

    .draw-label {
      position: absolute;
      top: 8px;
      left: 10px;
      padding: 2px 7px;
      background: rgba(255, 253, 248, .92);
      color: var(--muted);
      font-size: 11pt;
      border-radius: 4px;
    }

    .answer-box {
      border: 1.5px solid var(--grid);
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      min-height: 210px;
    }

    .prompt {
      margin: 0 0 8px;
      font-size: 13pt;
      font-weight: 700;
    }

    .answer-line {
      height: 32px;
      border-bottom: 1.4px solid #8a94a3;
    }

    .footer-note {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      font-size: 12pt;
    }

    .small-lines {
      display: grid;
      gap: 9px;
      margin-top: 7px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
        height: auto;
      }

      .preview-shell {
        padding: 14px;
      }

      .page {
        width: min(100%, 210mm);
        min-height: auto;
      }
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .controls {
        display: none;
      }

      .app {
        display: block;
      }

      .preview-shell {
        padding: 0;
        overflow: visible;
      }

      .page {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 8mm 10mm;
        box-shadow: none;
        break-after: auto;
      }

      .sheet-title {
        font-size: 21pt;
      }

      .sheet-subtitle,
      .meta-grid {
        font-size: 11pt;
      }

      .meta-grid {
        margin-top: 7px;
      }

      .section {
        margin-top: 8px;
      }

      .section-title {
        margin-bottom: 5px;
        font-size: 13pt;
      }

      .section-title .tag {
        width: 24px;
        height: 24px;
        font-size: 10pt;
      }

      .story-box {
        padding: 6px 9px 5px;
        font-size: 14pt;
        line-height: 1.72;
      }

      .copy-lines {
        gap: 4px;
      }

      .copy-line {
        height: 22px;
      }

      .practice-cell {
        min-height: 98px;
        grid-template-columns: 72px 1fr;
      }

      .draw-box,
      .answer-box {
        min-height: 178px;
      }

      .prompt {
        margin-bottom: 5px;
        font-size: 11.5pt;
      }

      .answer-line {
        height: 24px;
      }

      .footer-note {
        margin-top: 8px;
        font-size: 10.5pt;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="controls" aria-label="學習單控制區">
      <div class="brand-title">飽螺的社工甘苦便條紙製作</div>
      <h1>一年級注音學習單產生器</h1>

      <div class="control-group">
        <div class="field">
          <label for="themeSelect">主題</label>
          <select id="themeSelect"></select>
        </div>
        <div class="row">
          <div class="field">
            <label for="studentName">姓名</label>
            <input id="studentName" value="" placeholder="學生姓名">
          </div>
          <div class="field">
            <label for="sheetDate">日期</label>
            <input id="sheetDate" type="date">
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="randomBtn" type="button">隨機產生</button>
          <button id="printBtn" type="button">列印</button>
        </div>
      </div>

      <div class="control-group">
        <div class="field">
          <label for="customTitle">標題</label>
          <input id="customTitle" value="一年級國語注音學習單">
        </div>
        <div class="field">
          <label for="storyText">短文</label>
          <textarea id="storyText"></textarea>
        </div>
        <div class="field">
          <label for="practiceText">注音練習字</label>
          <input id="practiceText">
        </div>
        <div class="field">
          <label for="questionText">問題</label>
          <textarea id="questionText"></textarea>
        </div>
        <div class="field">
          <label for="drawText">畫圖題</label>
          <input id="drawText">
        </div>
      </div>

      <div class="control-group">
        <div class="field">
          <label for="rubyText">注音對照</label>
          <textarea id="rubyText"></textarea>
          <p class="hint">格式：字=注音，每行一組。例：山=ㄕㄢ。</p>
        </div>
        <button class="wide-button" id="applyBtn" type="button">更新預覽</button>
      </div>

      <div class="control-group">
        <div class="actions">
          <button id="saveBtn" type="button">存成PDF</button>
          <button id="resetBtn" type="button">列印</button>
        </div>
      </div>
      <p class="credit-note">本學習單生產器參考富田國小所提供之相關教案設計，在此感謝老師的創意。</p>
    </aside>

    <section class="preview-shell" aria-label="學習單預覽">
      <article class="page" id="worksheet">
        <header class="sheet-header">
          <div class="sheet-heading-line">
            <h2 class="sheet-title" id="sheetTitle"></h2>
            <p class="sheet-subtitle" id="sheetSubtitle"></p>
          </div>
        </header>

        <div class="meta-grid">
          <div>姓名：<span class="blank-line" id="nameLine"></span></div>
          <div>日期：<span class="blank-line" id="dateLine"></span></div>
          <div>家長：<span class="blank-line"></span></div>
        </div>

        <section class="section">
          <h3 class="section-title"><span class="tag">一</span><span>讀一讀，抄一抄</span></h3>
          <div class="story-box" id="storyBox"></div>
          <div class="copy-lines" aria-hidden="true">
            <div class="copy-line"></div>
            <div class="copy-line"></div>
            <div class="copy-line"></div>
            <div class="copy-line"></div>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title"><span class="tag">二</span><span>注音練習</span></h3>
          <div class="practice-grid" id="practiceGrid"></div>
        </section>

        <section class="section">
          <h3 class="section-title"><span class="tag">三</span><span>畫一畫，寫一寫</span></h3>
          <div class="activity-grid">
            <div class="draw-box">
              <div class="draw-label" id="drawLabel"></div>
            </div>
            <div class="answer-box">
              <p class="prompt" id="questionBox"></p>
              <div class="answer-line"></div>
              <div class="answer-line"></div>
              <div class="answer-line"></div>
            </div>
          </div>
        </section>

        <footer class="footer-note">
          <div>
            今日小任務：<span id="taskText"></span>
            <div class="small-lines">
              <div class="answer-line"></div>
            </div>
          </div>
          <div>
            我覺得今天：
            <div class="small-lines">
              <div class="answer-line"></div>
            </div>
          </div>
        </footer>
      </article>
    </section>
  </main>

  <script>
    const sheets =     [
          {
                key: "park",
                label: "公園散步",
                topic: "觀察",
                subtitle: "主題：公園散步",
                story: "今天早上，我和媽媽去公園。樹上有綠葉，地上有小花。我看一看，也慢慢說出看到的東西。",
                practice: "公園、樹葉、小花",
                question: "故事裡，孩子在公園看到什麼？",
                drawing: "畫出公園裡的一樣東西",
                task: "和家人說出今天看到的一種顏色。"
          },
          {
                key: "rain",
                label: "雨天上學",
                topic: "照顧",
                subtitle: "主題：雨天上學",
                story: "早上，下起小雨。爸爸幫我拿雨衣，我自己背好書包。到學校時，我跟爸爸說謝謝。",
                practice: "小雨、雨衣、書包",
                question: "故事裡，誰幫孩子拿雨衣？",
                drawing: "畫出一件雨天會用到的東西",
                task: "回家後，把雨具放在固定的位置。"
          },
          {
                key: "library",
                label: "圖書角",
                topic: "閱讀",
                subtitle: "主題：圖書角",
                story: "下課時，我走到圖書角。桌上有一本故事書，我安靜地看。看到好笑的地方，我小聲笑了。",
                practice: "圖書、故事、安靜",
                question: "孩子在圖書角做了什麼？",
                drawing: "畫出一本你想看的書",
                task: "今天選一本書，翻開看三頁。"
          },
          {
                key: "homework",
                label: "完成作業",
                topic: "專心",
                subtitle: "主題：完成作業",
                story: "晚飯後，我坐在書桌前。鉛筆和橡皮都放好了。我先寫一行字，再休息一下。",
                practice: "書桌、鉛筆、橡皮",
                question: "孩子先寫了什麼？",
                drawing: "畫出你寫作業時會用的文具",
                task: "完成一小段功課後，把文具收好。"
          },
          {
                key: "friend",
                label: "和同學分享",
                topic: "分享",
                subtitle: "主題：和同學分享",
                story: "美勞課時，我有兩張色紙。同學少了一張，我分給他一張。他笑著說謝謝，我也很開心。",
                practice: "同學、色紙、開心",
                question: "孩子把什麼分給同學？",
                drawing: "畫出你願意分享的一樣東西",
                task: "今天對一位同學或家人說一句好話。"
          },
          {
                key: "plant",
                label: "照顧小芽",
                topic: "耐心",
                subtitle: "主題：照顧小芽",
                story: "窗邊有一盆小芽。我輕輕澆水，也看看泥土。小芽還很小，我會每天來看它。",
                practice: "小芽、澆水、泥土",
                question: "孩子每天想看什麼？",
                drawing: "畫出一棵正在長大的植物",
                task: "觀察家裡或路邊的一片葉子。"
          },
          {
                key: "sel_responsibility",
                label: "整理座位",
                topic: "負責",
                subtitle: "SEL主題：負責",
                story: "下課前，我把鉛筆放進筆盒。椅子靠好，桌上也收乾淨。我做好自己的小事，心裡很踏實。",
                practice: "負責、座位、筆盒",
                question: "孩子做了哪一件負責的事？",
                drawing: "畫出你會自己整理的一樣東西",
                task: "今天自己收好一樣物品。"
          },
          {
                key: "sel_emotion",
                label: "我會說心情",
                topic: "情緒",
                subtitle: "SEL主題：情緒",
                story: "我今天有一點生氣，因為積木倒了。我先停一下，慢慢吸一口氣。後來，我告訴老師我的心情。",
                practice: "情緒、生氣、心情",
                question: "孩子生氣時，先做了什麼？",
                drawing: "畫出你今天的一種心情",
                task: "用一句話告訴家人今天的心情。"
          },
          {
                key: "sel_empathy",
                label: "我會關心同學",
                topic: "同理",
                subtitle: "SEL主題：同理",
                story: "同學跌倒了，坐在地上哭。我走過去，問他痛不痛。老師來以前，我陪他等一下。",
                practice: "同理、關心、陪伴",
                question: "孩子怎麼關心同學？",
                drawing: "畫出你幫助別人的樣子",
                task: "今天注意一位需要幫忙的人。"
          },
          {
                key: "line_up",
                label: "排隊等一等",
                topic: "等待",
                subtitle: "SEL主題：等待",
                story: "下課後，大家排隊去洗手。我站在後面，沒有推人。輪到我時，我慢慢把手洗乾淨。",
                practice: "排隊、洗手、輪到",
                question: "孩子排隊時沒有做什麼？",
                drawing: "畫出排隊洗手的樣子",
                task: "今天排隊時，練習等一等。"
          },
          {
                key: "toy_box",
                label: "收玩具",
                topic: "負責",
                subtitle: "SEL主題：負責",
                story: "遊戲時間結束了，我看到地上有積木。我把積木放回盒子。教室變乾淨，我心裡很舒服。",
                practice: "玩具、積木、盒子",
                question: "孩子把積木放到哪裡？",
                drawing: "畫出整理好的玩具",
                task: "玩完一樣東西後，把它放回去。"
          },
          {
                key: "borrow_eraser",
                label: "借橡皮",

    }

    function renderZhuyinMark(zhuyin) {
      const toneMarks = new Set(["ˊ", "ˇ", "ˋ", "˙"]);
      const marks = Array.from(String(zhuyin || ""));
      const tone = marks.filter((ch) => toneMarks.has(ch)).join("");
      const symbols = marks.filter((ch) => !toneMarks.has(ch));
      const stack = symbols.map((ch) => `<span>${escapeHTML(ch)}</span>`).join("");
      const toneHTML = tone ? `<span class="bpmf-tone">${escapeHTML(tone)}</span>` : "";
      return `<span class="bpmf-wrap"><span class="bpmf-stack">${stack}</span>${toneHTML}</span>`;
    }

    function renderRuby(text) {
      return Array.from(text).map((ch) => {
        if (ch === "\n") return "<br>";
        const zhuyin = state.ruby[ch];
        if (zhuyin) {
          return `<span class="phonetic-char"><span class="han">${escapeHTML(ch)}</span>${renderZhuyinMark(zhuyin)}</span>`;
        }
        return escapeHTML(ch);
      }).join("");
    }

    function dateForPrint(value) {
      if (!value) return "";
      const [y, m, d] = value.split("-");
      return `${Number(m)}月${Number(d)}日`;
    }

    function getPracticeTerms(value) {
      const raw = String(value || "").trim();
      if (!raw) return [];
      const explicitTerms = raw.split(/[，、,\n]+/).map((term) => term.trim()).filter(Boolean);
      if (explicitTerms.length > 1) return explicitTerms.slice(0, 3);
      const compact = raw.replace(/\s/g, "");
      const terms = [];
      for (let i = 0; i < compact.length && terms.length < 3; i += 2) {
        terms.push(compact.slice(i, i + 2));
      }
      return terms;
    }

    function renderPractice() {
      const terms = getPracticeTerms(practiceText.value);
      const grid = document.getElementById("practiceGrid");
      grid.innerHTML = "";
      terms.forEach((term) => {
        const item = document.createElement("div");
        item.className = "practice-cell";
        item.innerHTML = `
          <div class="model">${renderRuby(term)}</div>
          <div class="trace"><span></span><span></span></div>
        `;
        grid.appendChild(item);
      });
    }

    function render() {
      parseRubyInput();
      document.getElementById("sheetTitle").textContent = customTitle.value || "一年級國語注音學習單";
      document.getElementById("sheetSubtitle").textContent = state.active.subtitle;
      document.getElementById("nameLine").textContent = studentName.value;
      document.getElementById("dateLine").textContent = dateForPrint(sheetDate.value);
      document.getElementById("storyBox").innerHTML = renderRuby(storyText.value);
      document.getElementById("questionBox").innerHTML = renderRuby(questionText.value);
      document.getElementById("drawLabel").textContent = drawText.value;
      document.getElementById("taskText").textContent = state.active.task;
      renderPractice();
    }

    function randomSheet() {
      const selected = sheets[Math.floor(Math.random() * sheets.length)];
      loadSheet(selected);
    }

    function saveCurrent() {
      const payload = {
        theme: state.active.key,
        name: studentName.value,
        date: sheetDate.value,
        title: customTitle.value,
        story: storyText.value,
        practice: practiceText.value,
        question: questionText.value,
        drawing: drawText.value,
        ruby: rubyText.value
      };
      localStorage.setItem("first-grade-zhuyin-worksheet", JSON.stringify(payload));
    }

    function restoreSaved() {
      const raw = localStorage.getItem("first-grade-zhuyin-worksheet");
      if (!raw) return false;
      try {
        const payload = JSON.parse(raw);
        const sheet = sheets.find((item) => item.key === payload.theme) || sheets[0];
        state.active = sheet;
        themeSelect.value = sheet.key;
        studentName.value = payload.name || "";
        sheetDate.value = payload.date || todayString();
        customTitle.value = payload.title || "一年級國語注音學習單";
        storyText.value = payload.story || sheet.story;
        practiceText.value = payload.practice || sheet.practice;
        questionText.value = payload.question || sheet.question;
        drawText.value = payload.drawing || sheet.drawing;
        rubyText.value = payload.ruby || "";
        render();
        return true;
      } catch (error) {
        return false;
      }
    }

    fillThemeOptions();
    sheetDate.value = todayString();
    rubyText.value = "";
    if (!restoreSaved()) {
      loadSheet(sheets[0]);
    }

    themeSelect.addEventListener("change", () => {
      const sheet = sheets.find((item) => item.key === themeSelect.value) || sheets[0];
      loadSheet(sheet);
    });

    document.getElementById("randomBtn").addEventListener("click", randomSheet);
    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("applyBtn").addEventListener("click", render);
    document.getElementById("saveBtn").addEventListener("click", () => {
      saveCurrent();
      render();
      window.print();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      window.print();
    });

    [studentName, sheetDate, customTitle, storyText, practiceText, questionText, drawText, rubyText]
      .forEach((el) => el.addEventListener("input", render));
  </script>
</body>
</html>
